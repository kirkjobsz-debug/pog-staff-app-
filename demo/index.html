<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Atypical Solutions · burnout awareness · by tellme.life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f4;
  --panel: #ffffff;
  --ink: #2a2a2a;
  --muted: #767676;
  --line: #e8e3da;
  --sage: #84b59f;
  --sage-deep: #50808e;
  --sage-soft: #e7efe9;
  --plum: #6d4965;
  --warn: #c9774a;
  --warn-soft: #fbe6d8;
  --good: #6c8b62;
  --urgent: #b65454;
  --accent: var(--sage-deep);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); font-family: 'Inter', -apple-system, sans-serif; font-size: 15px; line-height: 1.55; min-height: 100vh; }
body { padding: 0; max-width: 460px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 60px; }
h1, h2, h3, .display { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
h1 { font-size: 28px; line-height: 1.15; }
h2 { font-size: 22px; line-height: 1.2; }
h3 { font-size: 18px; line-height: 1.25; }
.app-header { background: var(--sage-deep); color: white; padding: 14px 20px 12px; position: sticky; top: 0; z-index: 10; }
.app-header .row1 { display: flex; justify-content: space-between; align-items: center; }
.app-header .logo { display: flex; align-items: center; gap: 9px; }
.app-header .logo-mark { width: 28px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-weight: 700; color: var(--sage-deep); font-size: 16px; }
.app-header .logo-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; color: white; line-height: 1.1; }
.app-header .logo-name span { display: block; font-size: 10px; font-weight: 400; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; font-family: 'Inter', sans-serif; }
.app-header .nav { display: flex; gap: 14px; margin-top: 10px; }
.app-header .nav button { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; padding: 2px 0; font-family: inherit; }
.app-header .nav button.active { color: white; font-weight: 600; border-bottom: 2px solid white; padding-bottom: 4px; }
main { padding: 20px; }
.screen { animation: fadein .25s ease-out; }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
.card.sage { background: var(--sage-soft); border-color: #cfdfd2; }
.card.warm { background: var(--warn-soft); border-color: #efd2bd; }
.label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 600; }
.muted { color: var(--muted); font-size: 13px; }
.center { text-align: center; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 13px 18px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; width: 100%; transition: opacity .15s; }
.btn:active { opacity: 0.85; }
.btn.secondary { background: white; color: var(--ink); border: 1px solid var(--line); }
.btn.ghost { background: transparent; color: var(--muted); font-weight: 500; }
.btn.small { padding: 9px 14px; font-size: 13px; width: auto; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
input[type="text"], input[type="email"], textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; background: white; color: var(--ink); }
input:focus, textarea:focus { outline: none; border-color: var(--sage-deep); }
textarea { resize: none; min-height: 80px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
.slider-wrap { padding: 8px 4px 4px; }
.slider-val { text-align: center; font-family: 'Fraunces', serif; font-size: 56px; font-weight: 500; color: var(--accent); line-height: 1; margin: 8px 0 12px; }
.slider-val.low { color: var(--urgent); }
.slider-val.mid { color: var(--warn); }
.slider-val.high { color: var(--good); }
input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: linear-gradient(to right, var(--urgent), var(--warn), var(--good)); border-radius: 8px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: white; border: 3px solid var(--accent); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.slider-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--muted); }
.prog-wrap { background: var(--sage-soft); border-radius: 8px; height: 8px; overflow: hidden; margin: 4px 0; }
.prog-bar { background: var(--sage); height: 100%; transition: width .35s; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag { padding: 6px 12px; border-radius: 16px; background: white; border: 1px solid var(--line); font-size: 13px; cursor: pointer; user-select: none; }
.tag.on { background: var(--sage); color: white; border-color: var(--sage); }
.msg { padding: 12px 14px; border-radius: 14px; max-width: 86%; margin-bottom: 10px; font-size: 14px; line-height: 1.45; }
.msg.them { background: var(--sage-soft); border-bottom-left-radius: 4px; }
.msg.you { background: var(--accent); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
.msg .who { font-size: 11px; opacity: 0.65; margin-bottom: 4px; display: block; font-weight: 600; }
.chart { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; padding: 8px 0; gap: 6px; border-bottom: 1px solid var(--line); }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { width: 100%; background: var(--sage); border-radius: 6px 6px 0 0; min-height: 4px; transition: height .4s; position: relative; }
.bar.low { background: var(--urgent); }
.bar.mid { background: var(--warn); }
.bar-lbl { font-size: 10px; color: var(--muted); }
.bar-val { font-size: 10px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.mod-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
.mod-row:last-child { border-bottom: none; }
.mod-icon { width: 36px; height: 36px; background: var(--sage-soft); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; font-weight: 600; color: var(--sage-deep); }
.mod-icon.done { background: var(--sage); color: white; }
.mod-body { flex: 1; }
.mod-body strong { font-size: 14px; font-weight: 600; display: block; }
.mod-body span { font-size: 12px; color: var(--muted); }
.qbox { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
.qbox .qnum { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.qbox h3 { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 600; line-height: 1.35; margin-bottom: 14px; }
.opt { padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; background: white; transition: all .12s; }
.opt:hover { border-color: var(--sage); }
.opt.selected { border-color: var(--sage-deep); background: var(--sage-soft); font-weight: 500; }
.cert { background: linear-gradient(135deg, #faf8f4, #f0e9d8); border: 2px solid var(--sage-deep); border-radius: 16px; padding: 28px 22px; text-align: center; position: relative; }
.cert::before, .cert::after { content: ""; position: absolute; width: 28px; height: 28px; border: 2px solid var(--sage-deep); }
.cert::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
.cert::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }
.cert .crest { font-family: 'Fraunces', serif; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: var(--sage-deep); margin-bottom: 10px; }
.cert h2 { font-size: 24px; margin: 16px 0 4px; }
.cert .name { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; color: var(--plum); margin: 14px 0; padding: 10px 0; border-top: 1px solid var(--sage-deep); border-bottom: 1px solid var(--sage-deep); }
.cert .sig { margin-top: 18px; font-style: italic; font-family: 'Fraunces', serif; color: var(--sage-deep); font-size: 18px; }
.cert .meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
.result { padding: 24px 18px; border-radius: 16px; text-align: center; }
.result.pass { background: var(--sage-soft); border: 1px solid var(--sage); }
.result.fail { background: var(--warn-soft); border: 1px solid var(--warn); }
.result .score { font-family: 'Fraunces', serif; font-size: 64px; font-weight: 600; line-height: 1; margin: 10px 0; }
.app-footer { position: fixed; bottom: 0; left: 0; right: 0; max-width: 460px; margin: 0 auto; background: #f1e9d6; border-top: 1px solid #e3d8b6; padding: 10px 20px; text-align: center; font-size: 11px; color: #6b5d3a; }
.app-footer strong { color: #2a2a2a; font-weight: 600; font-family: 'Fraunces', serif; font-style: italic; }
.app-footer .tag { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.65; }
.flag { display: inline-block; background: var(--urgent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="row1">
    <div class="logo">
      <div class="logo-mark">A</div>
      <div class="logo-name">Atypical Solutions<span>staff wellbeing</span></div>
    </div>
  </div>
  <nav class="nav" id="nav-bar"></nav>
</header>

<main id="app"></main>

<footer class="app-footer">
  <div class="tag">powered by</div>
  <strong>tellme.life</strong>
</footer>

<script>
const MODULES = [
  { id:'welcome', title:'Welcome & psychological safety', minutes:4, notes:[
    'This is a supportive and reflective space.',
    'Participation is voluntary. There is no pressure to share personal experiences.',
    'Today is about awareness, prevention and practical wellbeing.',
    '"Many people in helping professions are highly compassionate, capable and committed - which can also place them at higher risk of burnout."'
  ]},
  { id:'stress', title:'Understanding stress, overwhelm & burnout', minutes:6, notes:[
    'Stress is a natural survival response and is not always bad.',
    'Short-term stress can improve performance.',
    'Chronic stress becomes harmful when recovery is limited.',
    'Stress = temporary pressure, can recover with rest, motivation still present.',
    'Overwhelm = flooded, difficulty coping, needs support, reduced clarity.',
    'Burnout = chronic exhaustion, emotional depletion, recovery takes longer, loss of motivation or cynicism.',
    'WHO defines burnout: "a syndrome resulting from chronic workplace stress that has not been successfully managed."',
    'Three dimensions: emotional exhaustion, mental distance or cynicism, reduced professional efficacy.'
  ]},
  { id:'nervous', title:'The nervous system & chronic stress', minutes:5, notes:[
    'Stress response is protection: fight, flight, freeze, fawn.',
    'Polyvagal: social engagement = recovery; sympathetic = fight/flight; dorsal vagal = shutdown.',
    'Burnout hijacks the vagus nerve. Recovery requires vagal tone restoration.',
    'Physical effects: fatigue, sleep disruption, headaches, muscle tension, increased illness.',
    'Cognitive effects: brain fog, difficulty concentrating, forgetfulness, reduced motivation.',
    'Emotional effects: irritability, anxiety, emotional numbness, reduced patience.'
  ]},
  { id:'signs', title:'Recognising the warning signs', minutes:5, notes:[
    'Emotional: feeling drained, increased frustration, detachment, compassion fatigue.',
    'Behavioural: withdrawal, reduced motivation, procrastination, overworking.',
    'Physical: constant exhaustion, poor sleep, frequent illness.',
    'Cortisol recovery: mild burnout 2-4 weeks; moderate 6-12 weeks; severe 3-6 months or longer.',
    'Full neurobiological recovery lags behind feeling better. Patience is essential.'
  ]},
  { id:'boundaries', title:'Boundaries, energy & compassion fatigue', minutes:5, notes:[
    'Healthy boundaries: saying no when needed, taking breaks, not over-functioning, separating work from personal time, asking for support.',
    'Boundaries are not rejection. They are protection.',
    'Emotional energy elements: bandwidth, compassion fatigue, energy leaks, recovery cycles.',
    'Why support workers are vulnerable: emotional labour, high empathy, caring for others before self, staff shortages, difficulty switching off.'
  ]},
  { id:'selfcare', title:'Sustainable self-care & resilience', minutes:5, notes:[
    'NOT self-care: perfectionism, expensive wellness trends, toxic positivity.',
    'IS self-care: sleep, rest, nutrition, connection, movement, quiet moments, boundaries, support.',
    'Micro tools: 3 deep breaths before tasks, stretch breaks, short walks, hydration, transition rituals after work, phone-free time, grounding.',
    'Resilience is not pushing through. It grows through support, not isolation.',
    'Prevention always beats recovery. Prevention is low effort sustained over time; recovery is high effort and often requires role change or leave.'
  ]},
  { id:'support', title:'When to seek professional support', minutes:3, notes:[
    'Self-care tools are foundational but not complete.',
    'Therapy for nervous system retraining.',
    'Medical check (thyroid, vitamin D, sleep disorders).',
    'Coaching for boundary and communication work.',
    'Career counseling for role or environment changes.',
    'There is no shame in asking. Recovery often requires support.',
    'Australia: Lifeline 13 11 14 · Beyond Blue 1300 22 4636 · your EAP.'
  ]}
];

const QUIZ = [
  { q:'According to the WHO, burnout is a syndrome resulting from:', opts:['Personal weakness or lack of resilience','Chronic workplace stress that has not been successfully managed','Lack of professional qualifications','Poor work-life balance choices'], correct:1 },
  { q:'What are the THREE dimensions of burnout?', opts:['Stress, anxiety, fatigue','Emotional exhaustion, mental distance/cynicism, reduced professional efficacy','Physical, mental, spiritual','Work overload, role conflict, value mismatch'], correct:1 },
  { q:'Recovery from moderate burnout typically takes:', opts:['A day or two of rest','1 to 2 weeks','6 to 12 weeks','A few hours of meditation'], correct:2 },
  { q:'Severe burnout recovery may take:', opts:['1 day','1 week','2-4 weeks','3-6 months or longer'], correct:3 },
  { q:'Which is NOT considered self-care?', opts:['Sleep and rest','Toxic positivity and ignoring how you feel','Saying no when needed','Asking for support'], correct:1 },
  { q:'What is the difference between stress and burnout?', opts:['There is no difference','Stress is temporary and recoverable with rest; burnout is chronic, depleting','Stress is mental and burnout is physical','Burnout only affects new staff'], correct:1 },
  { q:'In polyvagal terms, which state supports recovery and connection?', opts:['Sympathetic activation','Social engagement system','Dorsal vagal shutdown','Fight or flight'], correct:1 },
  { q:'Boundaries in care work are:', opts:['A form of rejection','Protection that sustains your ability to give','Optional, only for junior staff','A sign you do not care enough'], correct:1 },
  { q:'Prevention vs recovery:', opts:['Recovery is always cheaper','Prevention is low-effort sustained; recovery is high-effort and may need role change or leave','Both cost the same','Prevention is only for management'], correct:1 },
  { q:'A reasonable micro self-care tool mid-shift is:', opts:['Quit your job','Three deep breaths before the next task','Skip lunch to catch up','Push through'], correct:1 },
  { q:'When should you consider professional support beyond self-care?', opts:['Never','Only if hospitalised','When persistent signs and self-care alone is not shifting them','Only if your manager asks'], correct:2 },
  { q:'The four nervous system stress responses are:', opts:['Fight, flight, freeze, fawn','Anger, fear, sadness, joy','Run, hide, attack, smile','Awake, asleep, alert, calm'], correct:0 },
  { q:'The grounding "5-4-3-2-1" technique uses your:', opts:['Five fingers tapping','Senses: see, feel, hear, smell, taste','Five breaths and four steps','Five minutes of silence'], correct:1 },
  { q:'Which is an EARLY emotional warning sign of burnout?', opts:['Increased productivity','Feeling emotionally drained and detached','Better sleep','More enthusiasm'], correct:1 },
  { q:'Resilience is best described as:', opts:['Pushing through no matter what','The ability to recover, supported by connection and self-awareness','Never feeling stress','Always being positive'], correct:1 },
  { q:'Why are support workers especially vulnerable to burnout?', opts:['They are weaker than other workers','Emotional labour, high empathy, caring for others before self, hard to switch off','They work shorter hours','They have less training'], correct:1 },
  { q:'Which is NOT a typical workplace burnout trigger?', opts:['High workload','Lack of control','Sufficient recognition and clear feedback','Poor boundaries'], correct:2 },
  { q:'Compassion fatigue is best understood as:', opts:['A sign you no longer care','The emotional cost of repeatedly caring for others without enough recovery','A medical illness','Weakness'], correct:1 },
  { q:'Organisational factors in burnout include all EXCEPT:', opts:['Staffing ratios and workload','Decision-making autonomy','Psychological safety and trust','Personal hobbies outside work'], correct:3 },
  { q:'Which statement is TRUE about resilience?', opts:['It is built in isolation','It grows through support and connection, not pushing through alone','It cannot be developed','It only matters in a crisis'], correct:1 },
  { q:'Which of these is a sustainable daily self-care practice?', opts:['Expensive wellness retreats','Brief transitions between work and rest (e.g. a walk, phone-free time)','Working through breaks','Pretending you feel fine'], correct:1 }
];

const KEY = 'atypical_demo_v1';
const FLAG_WORDS = ["can't","cant","cannot cope","hopeless","panic","breaking","done with this","quit","leaving","suicidal","suicide","drinking too","can't sleep","cant sleep","no point","want out"];

function loadState(){ try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; }}
function saveState(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
let S = loadState();
if (!S.checkins) S.checkins = [];
if (!S.quiz) S.quiz = {};
if (!S.chat) S.chat = [];
if (!S.flags) S.flags = [];

function todayISO(){ return new Date().toISOString().slice(0,10); }
function shortDate(s){ const d=new Date(s); return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}).split(' ')[0]; }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let CURRENT = 'home';
let QS = null;
let CTX = null;

function go(screen, ctx){ CURRENT = screen; CTX = ctx; render(); window.scrollTo(0,0); }

function navBar(){
  if (!S.user) return '';
  const tabs = [['home','Home'],['course','Course'],['checkin','Check-in'],['stats','Me']];
  return tabs.map(([id,lbl]) => {
    const active = CURRENT===id || (id==='course'&&['module','quiz','quiz-result','certificate'].includes(CURRENT)) || (id==='checkin'&&['pre','post','chat'].includes(CURRENT));
    return `<button class="${active?'active':''}" onclick="go('${id}')">${lbl}</button>`;
  }).join('');
}

function render(){
  document.getElementById('nav-bar').innerHTML = navBar();
  const root = document.getElementById('app');
  if (!S.user && CURRENT !== 'register') CURRENT = 'register';
  let html = '';
  switch(CURRENT){
    case 'register': html = scrRegister(); break;
    case 'home': html = scrHome(); break;
    case 'course': html = scrCourse(); break;
    case 'module': html = scrModule(CTX); break;
    case 'quiz': html = scrQuiz(); break;
    case 'quiz-result': html = scrQuizResult(); break;
    case 'certificate': html = scrCertificate(); break;
    case 'checkin': html = scrCheckinHub(); break;
    case 'pre': html = scrCheckin('pre'); break;
    case 'post': html = scrCheckin('post'); break;
    case 'chat': html = scrChat(); break;
    case 'stats': html = scrStats(); break;
  }
  root.innerHTML = '<div class="screen">' + html + '</div>';
  if (CURRENT==='pre'||CURRENT==='post') wireSlider();
}

function scrRegister(){
  return `
    <div class="card sage center">
      <div class="label">Atypical · staff wellbeing</div>
      <h1 style="margin:14px 0 8px">Burnout Awareness<br>& Recovery</h1>
      <p class="muted">A small, calm app. Your honesty here helps us look after you.</p>
    </div>
    <div class="card">
      <div class="field"><label>Your first name</label><input id="r-name" type="text" placeholder="e.g. Saranga"></div>
      <div class="field"><label>Email (for your certificate)</label><input id="r-email" type="email" placeholder="you@example.com"></div>
      <div class="field"><label>Role</label><input id="r-role" type="text" placeholder="e.g. Front of house"></div>
      <button class="btn" onclick="startReg()">Begin</button>
      <p class="muted center" style="margin-top:10px;font-size:11.5px;line-height:1.5">By starting, you agree that if a wellbeing signal is detected, your check-in may be shared with Lora at Atypical so she can reach out.</p>
    </div>
  `;
}
function startReg(){
  const name = document.getElementById('r-name').value.trim();
  if (!name){ alert('Please enter your first name'); return; }
  S.user = { name, email: document.getElementById('r-email').value.trim(), role: document.getElementById('r-role').value.trim(), joinedAt: new Date().toISOString() };
  saveState(S);
  go('home');
}

function scrHome(){
  const read = Object.keys(S.quiz).filter(k => S.quiz[k].read).length;
  const todayKey = todayISO();
  const todayCheckins = S.checkins.filter(c => c.date === todayKey);
  const didPre = todayCheckins.some(c => c.kind === 'pre');
  const didPost = todayCheckins.some(c => c.kind === 'post');
  return `
    <h1>Hello, ${esc(S.user.name)}</h1>
    <p class="muted" style="margin-bottom:18px">${new Date().toLocaleDateString('en-AU',{weekday:'long', day:'numeric', month:'long'})}</p>
    <div class="card sage">
      <div class="label">Today's check-in</div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn ${didPre?'secondary':''}" onclick="go('pre')">${didPre?'✓ Pre-shift':'Pre-shift'}</button>
        <button class="btn ${didPost?'secondary':''}" onclick="go('post')">${didPost?'✓ Post-shift':'Post-shift'}</button>
      </div>
    </div>
    <div class="card">
      <div class="label">Your course</div>
      <h3 style="margin:8px 0">Burnout Awareness & Recovery</h3>
      <div class="prog-wrap"><div class="prog-bar" style="width:${(read/MODULES.length)*100}%"></div></div>
      <p class="muted" style="margin-top:8px">${read} of ${MODULES.length} modules read${S.quiz.initial?.passed ? ' · certificate earned' : ''}</p>
      <button class="btn" style="margin-top:14px" onclick="go('course')">${S.quiz.initial?.passed?'Open course':'Continue learning'}</button>
    </div>
    ${last7Card()}
  `;
}

function last7Card(){
  const days = lastNDays(7);
  if (!days.some(d => d.pre !== null || d.post !== null)) return '';
  return `<div class="card"><div class="label">Last 7 days</div>${miniChart(days)}<p class="muted" style="font-size:12px;margin-top:8px">Only you see this. The hotel sees aggregate trends, never your individual scores.</p></div>`;
}

function lastNDays(n){
  const out = [];
  const today = new Date();
  for (let i = n-1; i >= 0; i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const day = S.checkins.filter(c => c.date === key);
    out.push({ date: key, pre: day.find(c=>c.kind==='pre')?.score ?? null, post: day.find(c=>c.kind==='post')?.score ?? null });
  }
  return out;
}

function miniChart(days){
  return `<div class="chart">${days.map(d => {
    const avg = (d.pre !== null && d.post !== null) ? (d.pre + d.post)/2 : (d.pre ?? d.post);
    const h = avg !== null ? Math.max(6, (avg/10)*100) : 6;
    const cls = avg === null ? '' : (avg <= 3 ? 'low' : avg <= 6 ? 'mid' : '');
    const v = avg === null ? '·' : avg.toFixed(0);
    return `<div class="bar-col"><span class="bar-val">${v}</span><div class="bar ${cls}" style="height:${h}%"></div><span class="bar-lbl">${shortDate(d.date)}</span></div>`;
  }).join('')}</div>`;
}

function scrCourse(){
  const allRead = MODULES.every(m => S.quiz[m.id]?.read);
  return `
    <h1>Course modules</h1>
    <p class="muted" style="margin-bottom:14px">Read each module. Take the initial test when ready. Re-tests at 1 week, 1 month and 6 months are sent automatically.</p>
    <div class="card">
      ${MODULES.map((m,i) => {
        const done = !!S.quiz[m.id]?.read;
        return `<div class="mod-row" onclick="go('module','${m.id}')">
          <div class="mod-icon ${done?'done':''}">${done?'✓':(i+1)}</div>
          <div class="mod-body"><strong>${esc(m.title)}</strong><span>${m.minutes} min read</span></div>
        </div>`;
      }).join('')}
    </div>
    ${allRead ? `
      <div class="card sage center">
        <h3 style="margin-bottom:8px">You're ready</h3>
        <p class="muted" style="margin-bottom:14px">${S.quiz.initial?.passed ? 'You passed the initial test. Your certificate is below.' : '10 questions. Pass mark 70%. Take it when you have 5 quiet minutes.'}</p>
        ${S.quiz.initial?.passed ? `<button class="btn" onclick="go('certificate')">View certificate</button>` : `<button class="btn" onclick="startQuiz('initial')">Start initial test</button>`}
      </div>` : ''}
  `;
}

function scrModule(id){
  const m = MODULES.find(x => x.id === id);
  return `
    <button class="btn ghost small" onclick="go('course')" style="padding:0;margin-bottom:12px">← Back to course</button>
    <div class="label">${m.minutes} min read · By Lora</div>
    <h1 style="margin:8px 0 18px">${esc(m.title)}</h1>
    <div class="card">
      <ul style="list-style:none">
        ${m.notes.map(n => `<li style="padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px;line-height:1.55">${esc(n)}</li>`).join('')}
      </ul>
    </div>
    <button class="btn" onclick="markRead('${m.id}')">${S.quiz[m.id]?.read ? '✓ Read · go back' : 'Mark as read'}</button>
  `;
}

function markRead(id){
  if (!S.quiz[id]) S.quiz[id] = {};
  S.quiz[id].read = true;
  saveState(S);
  go('course');
}

function startQuiz(kind){
  QS = { kind, i: 0, score: 0 };
  go('quiz');
}

function scrQuiz(){
  const q = QUIZ[QS.i];
  const pct = (QS.i/QUIZ.length)*100;
  return `
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <p class="muted center" style="margin:6px 0 18px;font-size:12px">Question ${QS.i+1} of ${QUIZ.length}</p>
    <div class="qbox">
      <div class="qnum">By Lora · Atypical</div>
      <h3>${esc(q.q)}</h3>
      ${q.opts.map((o,i) => `<div class="opt" onclick="pickAns(${i})">${esc(o)}</div>`).join('')}
    </div>
  `;
}

function pickAns(i){
  const q = QUIZ[QS.i];
  if (i === q.correct) QS.score++;
  QS.i++;
  if (QS.i >= QUIZ.length){
    const pct = (QS.score/QUIZ.length)*100;
    const passed = pct >= 70;
    S.quiz[QS.kind] = { score: QS.score, pct, passed, takenAt: new Date().toISOString() };
    saveState(S);
    go('quiz-result');
  } else {
    render();
  }
}

function scrQuizResult(){
  const r = S.quiz[QS.kind];
  return `
    <div class="result ${r.passed?'pass':'fail'} center">
      <div class="label">${r.passed?'PASSED':'NOT QUITE YET'}</div>
      <div class="score">${r.pct.toFixed(0)}<span style="font-size:24px">%</span></div>
      <p style="margin-bottom:16px">${r.score} of ${QUIZ.length} correct</p>
      ${r.passed
        ? `<p class="muted" style="margin-bottom:14px">Re-tests at 1 week, 1 month and 6 months will arrive automatically.</p><button class="btn" onclick="go('certificate')">View your certificate</button>`
        : `<p class="muted" style="margin-bottom:14px">Pass mark is 70%. Take a break and try again after 24 hours.</p><button class="btn secondary" onclick="go('course')">Back to course</button>`}
    </div>
  `;
}

function scrCertificate(){
  const d = new Date(S.quiz.initial.takenAt);
  return `
    <button class="btn ghost small" onclick="go('home')" style="padding:0;margin-bottom:12px">← Home</button>
    <div class="cert">
      <div class="crest">Atypical · wellbeing</div>
      <h2 class="display">Certificate of Completion</h2>
      <p class="muted" style="font-size:13px">This certifies that</p>
      <div class="name">${esc(S.user.name)}</div>
      <p style="font-size:14px;line-height:1.5">has completed<br><strong>Burnout Awareness & Recovery</strong><br>at the foundational level.</p>
      <div class="sig">Lora<br><span style="font-size:11px;font-style:normal;letter-spacing:1.5px;text-transform:uppercase;color:var(--sage-deep)">Atypical</span></div>
      <div class="meta">${d.toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <button class="btn" style="margin-top:14px" onclick="window.print()">Save / print</button>
    <div class="card warm" style="margin-top:14px">
      <strong style="font-size:14px">What's next, automatically:</strong>
      <ul style="list-style:none;margin-top:8px;font-size:13px;line-height:1.7;color:var(--muted)">
        <li>· Reinforcement test in 1 week</li>
        <li>· Retention test in 1 month</li>
        <li>· Mastery test in 6 months → final certificate</li>
      </ul>
    </div>
  `;
}

function scrCheckinHub(){
  const todayKey = todayISO();
  const today = S.checkins.filter(c => c.date === todayKey);
  return `
    <h1>Daily check-in</h1>
    <p class="muted" style="margin-bottom:18px">Two short moments. Honest beats long.</p>
    <div class="card sage center">
      <h3 style="margin-bottom:6px">Pre-shift</h3>
      <p class="muted" style="font-size:13px;margin-bottom:12px">How are you arriving today?</p>
      ${today.find(c=>c.kind==='pre')
        ? `<p style="font-weight:600;color:var(--sage-deep)">✓ Logged today (${today.find(c=>c.kind==='pre').score}/10)</p>`
        : `<button class="btn" onclick="go('pre')">Start pre-shift</button>`}
    </div>
    <div class="card center">
      <h3 style="margin-bottom:6px">Post-shift</h3>
      <p class="muted" style="font-size:13px;margin-bottom:12px">How did the shift land?</p>
      ${today.find(c=>c.kind==='post')
        ? `<p style="font-weight:600;color:var(--sage-deep)">✓ Logged today (${today.find(c=>c.kind==='post').score}/10)</p>`
        : `<button class="btn secondary" onclick="go('post')">Start post-shift</button>`}
    </div>
  `;
}

function scrCheckin(kind){
  const title = kind === 'pre' ? 'Pre-shift check-in' : 'Post-shift check-in';
  const prompt = kind === 'pre' ? 'How are you feeling about today?' : 'How did the shift land for you?';
  const tags = kind === 'pre' ? ['Steady','Tired','Anxious','Calm','Foggy'] : ['Energised','Drained','Proud','Frustrated','OK'];
  return `
    <button class="btn ghost small" onclick="go('checkin')" style="padding:0;margin-bottom:12px">← Back</button>
    <h1>${title}</h1>
    <p class="muted" style="margin:6px 0 18px">${prompt}</p>
    <div class="card">
      <div class="slider-wrap">
        <div class="slider-val mid" id="sv">5</div>
        <input type="range" min="0" max="10" step="1" value="5" id="sl">
        <div class="slider-labels"><span>Worst</span><span>Middle</span><span>Best</span></div>
      </div>
    </div>
    <div class="card">
      <div class="label" style="margin-bottom:8px">A word or sentence (optional)</div>
      <textarea id="cmt" maxlength="200" placeholder="Anything you want Lora's team to know..."></textarea>
      <p class="muted" style="font-size:11px;margin-top:6px"><span id="cc">0</span>/200</p>
      <div class="label" style="margin:14px 0 8px">Quick tags</div>
      <div class="tag-row">${tags.map(t => `<span class="tag" onclick="this.classList.toggle('on')">${t}</span>`).join('')}</div>
    </div>
    <button class="btn" onclick="submitCheckin('${kind}')">Save check-in</button>
    <p class="muted center" style="font-size:11px;margin-top:10px">If anything you wrote looks heavy, you'll get a short word from Lora. Otherwise we stay out of your way.</p>
  `;
}

function wireSlider(){
  const sl = document.getElementById('sl');
  const sv = document.getElementById('sv');
  const cmt = document.getElementById('cmt');
  const cc = document.getElementById('cc');
  if (sl && sv){
    sl.addEventListener('input', e => {
      const v = +e.target.value;
      sv.textContent = v;
      sv.className = 'slider-val ' + (v <= 3 ? 'low' : v <= 6 ? 'mid' : 'high');
    });
  }
  if (cmt && cc) cmt.addEventListener('input', e => cc.textContent = e.target.value.length);
}

function submitCheckin(kind){
  const score = +document.getElementById('sl').value;
  const comment = document.getElementById('cmt').value.trim();
  const tags = [...document.querySelectorAll('.tag.on')].map(t => t.textContent);
  const entry = { kind, score, comment, tags, date: todayISO(), at: new Date().toISOString() };
  S.checkins.unshift(entry);
  saveState(S);
  const flagged = checkFlags(entry);
  if (flagged.length){
    S.flags.unshift({ at: entry.at, reasons: flagged, kind, score, comment });
    saveState(S);
    S.chat = [];
    go('chat', { auto: true, fromFlag: true, entry });
  } else if (comment.length > 0 || score <= 5){
    S.chat = [];
    go('chat', { auto: true, entry });
  } else {
    go('home');
  }
}

function checkFlags(e){
  const out = [];
  if (e.score <= 1) out.push('score 0 or 1 — immediate');
  if (e.score <= 3){
    const recent = S.checkins.filter(c => c.kind === e.kind).slice(0, 2);
    if (recent.length === 2 && recent.every(c => c.score <= 3)) out.push('≤3 two days running');
  }
  if (e.comment){
    const lc = e.comment.toLowerCase();
    if (FLAG_WORDS.some(w => lc.includes(w))) out.push('flagged keyword in comment');
  }
  const prior = S.checkins.find(c => c.kind === e.kind && c.date !== e.date);
  if (prior && (prior.score - e.score >= 4)) out.push('score drop ≥4 day-over-day');
  return out;
}

function scrChat(){
  if (CTX && CTX.auto && S.chat.length === 0 && CTX.entry){
    S.chat = [{ who:'lora', text: chatOpening(CTX.entry, !!CTX.fromFlag) }];
    saveState(S);
  }
  const youCount = S.chat.filter(m => m.who === 'you').length;
  const overLimit = youCount >= 3;
  const recentFlag = S.flags[0];
  const recentFlagToday = recentFlag && recentFlag.at && new Date(recentFlag.at).toDateString() === new Date().toDateString();
  return `
    <button class="btn ghost small" onclick="go('home')" style="padding:0;margin-bottom:12px">← Home</button>
    <h1 style="margin-bottom:4px">A short word</h1>
    <p class="muted" style="margin-bottom:14px">By Lora · Atypical</p>
    ${recentFlagToday ? `<div class="card warm" style="margin-bottom:14px;padding:10px 14px"><span class="flag">flagged to Atypical</span><p style="font-size:13px;margin-top:6px;line-height:1.5">Lora's team will reach out within 24 hours.</p></div>` : ''}
    <div id="chat-thread">${S.chat.map(m => `<div class="msg ${m.who==='lora'?'them':'you'}">${m.who==='lora'?'<span class="who">Lora</span>':''}${esc(m.text)}</div>`).join('')}</div>
    ${overLimit
      ? `<div class="card sage center" style="margin-top:14px">
          <p style="font-size:14px;margin-bottom:10px">I want to make sure you're properly heard. My team at Atypical takes it from here when something this real comes up.</p>
          <button class="btn" onclick="requestEscalation()">Yes, let Lora know</button>
          <button class="btn secondary" style="margin-top:8px" onclick="endChat()">Not now</button>
         </div>`
      : `<div class="card" style="padding:10px"><textarea id="chat-in" rows="2" placeholder="Reply to Lora..." style="margin-bottom:6px"></textarea><button class="btn" onclick="sendChat()">Send</button></div>`}
    <button class="btn ghost small" style="display:block;margin:14px auto 0" onclick="endChat()">That's enough · go home</button>
  `;
}

function chatOpening(c, flagged){
  if (flagged) return `Hi ${S.user.name}. What you've shared lands as something I want to take seriously. I'm here. Tell me a little more if you can, and someone from my team will reach out within 24 hours.`;
  if (c.score <= 3) return `Hi ${S.user.name}. A ${c.score} ${c.kind === 'pre' ? 'going into a shift' : 'at the end of a shift'} is a hard place. Thanks for being honest. Without solving anything yet, what's heaviest right now?`;
  if (c.score <= 5) return `Hi ${S.user.name}. ${c.kind === 'pre' ? 'A middle morning' : 'A middle end-of-shift'} can sneak up on you. What's one small thing that would help today?`;
  if (c.comment) return `Hi ${S.user.name}. Thank you for the note. What's behind it?`;
  return `Hi ${S.user.name}. Good to see you check in. Anything you want me to know?`;
}

function sendChat(){
  const i = document.getElementById('chat-in');
  const text = i.value.trim(); if (!text) return;
  S.chat.push({ who:'you', text });
  const lc = text.toLowerCase();
  const flagKW = FLAG_WORDS.some(w => lc.includes(w));
  const youCount = S.chat.filter(m => m.who === 'you').length;
  let resp = '';
  if (flagKW){
    resp = `That's important, and not a small thing to say. I'm flagging this to my team at Atypical so we can reach out properly within 24 hours. You're not on your own with this.`;
    S.flags.unshift({ at: new Date().toISOString(), reasons:['keyword in chat'], comment: text });
  } else if (youCount === 1){
    resp = `Thanks for telling me. What would feel like a small useful next step in the next 24 hours - just one thing?`;
  } else if (youCount === 2){
    resp = `That makes sense. Try it gently and see what shifts. If nothing shifts in 2-3 days, that's a signal worth hearing.`;
  } else {
    resp = `I'd like to make sure this gets the attention it deserves. Let me pass it to my team.`;
  }
  S.chat.push({ who:'lora', text: resp });
  saveState(S);
  render();
}

function requestEscalation(){
  S.flags.unshift({ at: new Date().toISOString(), reasons:['user requested human'], conversation: [...S.chat] });
  S.chat.push({ who:'lora', text:'Done. Someone from Atypical will reach out within 24 hours. Rest is allowed in the meantime.' });
  saveState(S);
  render();
}

function endChat(){
  S.chat = [];
  saveState(S);
  go('home');
}

function scrStats(){
  const days = lastNDays(14);
  const allPre = S.checkins.filter(c => c.kind === 'pre').map(c => c.score);
  const allPost = S.checkins.filter(c => c.kind === 'post').map(c => c.score);
  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '—';
  return `
    <h1>How you've been</h1>
    <p class="muted" style="margin-bottom:18px">Only you see this. The hotel sees aggregate trends only.</p>
    <div class="card">
      <div class="label">Last 14 days</div>
      ${miniChart(days)}
    </div>
    <div class="card">
      <div class="label">Averages</div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;text-align:center">
        <div><div style="font-family:'Fraunces',serif;font-size:36px;color:var(--sage-deep);font-weight:600">${avg(allPre)}</div><div class="muted" style="font-size:12px">Pre-shift</div></div>
        <div><div style="font-family:'Fraunces',serif;font-size:36px;color:var(--plum);font-weight:600">${avg(allPost)}</div><div class="muted" style="font-size:12px">Post-shift</div></div>
        <div><div style="font-family:'Fraunces',serif;font-size:36px;color:var(--good);font-weight:600">${S.checkins.length}</div><div class="muted" style="font-size:12px">Check-ins</div></div>
      </div>
    </div>
    <div class="card">
      <div class="label">Course progress</div>
      <div class="prog-wrap" style="margin-top:10px"><div class="prog-bar" style="width:${(Object.keys(S.quiz).filter(k=>S.quiz[k].read).length/MODULES.length)*100}%"></div></div>
      <p class="muted" style="margin-top:8px;font-size:13px">${S.quiz.initial?.passed ? '✓ Initial certificate earned' : 'Initial test not yet taken'}</p>
    </div>
    ${S.flags.length ? `<div class="card warm"><div class="label" style="color:var(--warn)">Atypical follow-ups</div><p style="font-size:13px;margin-top:8px">${S.flags.length} signal${S.flags.length>1?'s':''} sent. Lora's team responds within 24h.</p></div>` : ''}
    <button class="btn ghost" style="margin-top:10px" onclick="if(confirm('Reset all demo data?')){localStorage.removeItem('${KEY}');location.reload();}">Reset demo data</button>
  `;
}

render();
</script>

</body>
</html>
